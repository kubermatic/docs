[build.environment]
HUGO_VERSION = "0.159.1"

[context.production]
command = "hugo --minify"

[context.deploy-preview]
command = "hugo -D -F -b $DEPLOY_PRIME_URL"

[functions]
directory = "functions"

[functions."deploy-succeeded"]
included_files = ["public/search.json"]

[[headers]]
  for = "/"
  [headers.values]
    Link = '''</llms.txt>; rel="llms-txt", </sitemap.xml>; rel="sitemap", </search.json>; rel="search"'''
